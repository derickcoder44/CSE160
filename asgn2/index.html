<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Blocky Elephant</title>
  <style>
    body { font-family: sans-serif; margin: 16px; display: flex; gap: 20px; }
    canvas { border: 1px solid #888; }
    #controls { width: 280px; max-height: 600px; overflow-y: auto; }
    .control-group { margin: 6px 0; }
    label { font-size: 13px; }
    input[type=range] { width: 100%; }
    p { margin: 6px 0; font-size: 13px; }
  </style>
</head>
<body onload="main()">
  <canvas id="webgl" width="600" height="500">canvas not supported</canvas>

  <div id="controls">
    <p>Y Rotation: <span id="angleVal">0</span></p>
    <input type="range" id="angleSlide" min="-180" max="180" value="0">

    <p>
      <button id="animOn">Animate</button>
      <button id="animOff">Stop</button>
    </p>

    <div id="jointControls"></div>

    <p>Drag to rotate. Shift+click to poke.</p>
    <p id="perf">FPS: --</p>
  </div>

  <script src="lib/webgl-utils.js"></script>
  <script src="lib/webgl-debug.js"></script>
  <script src="lib/cuon-utils.js"></script>
  <script src="lib/cuon-matrix.js"></script>
  <script src="src/BlockyAnimal.js"></script>
</body>
</html>
